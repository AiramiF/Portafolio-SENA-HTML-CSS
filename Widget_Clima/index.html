<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Widget del Clima</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="widget">

<h2>🌤 Clima en Barranquilla</h2>

<div class="clima-principal">
<div class="icono">☀️</div>
<div class="temperatura">31°C</div>
<div class="estado">Soleado</div>
</div>

<div class="info">
<div class="dato">
<h3>💧 Humedad</h3>
<p>78%</p>
</div>

<div class="dato">
<h3>💨 Viento</h3>
<p>15 km/h</p>
</div>

<div class="dato">
<h3>🌡 Sensación</h3>
<p>35°C</p>
</div>
</div>

<div class="mensaje">
Día caluroso típico de Barranquilla, con mucho sol y brisa del Caribe.
</div>

</div>

</body>
</html>
